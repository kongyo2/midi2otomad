appId: com.kongyo2.midi2otomad
productName: midi2otomad
directories:
  buildResources: build
  output: release
files:
  - "**/*"
  - "!src/**/*"
  - "!electron.vite.config.ts"
  - "!**/@seydx/node-av-win32-x64-mingw/**"
asarUnpack:
  - "**/*.node"
  - "**/@seydx/**"
win:
  target: nsis
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
mac:
  target: dmg
  category: public.app-category.music
linux:
  target: AppImage
  category: Audio
