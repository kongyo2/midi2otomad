name: Release

on:
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-release:
    name: Create draft release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    steps:
      - uses: actions/checkout@v4

      - name: Create draft release
        id: create-release
        uses: actions/github-script@v7
        env:
          RELEASE_BODY: |
            midi2otomad のインストーラ／実行ファイルです。お使いの OS のアセットをダウンロードしてください。

            - **Windows** — `.exe`（NSIS インストーラ）または `.msi`
            - **macOS**（Intel / Apple Silicon 共通のユニバーサルバイナリ）— `.dmg`
            - **Linux** — `.AppImage`（そのまま実行）/ `.deb`（Debian・Ubuntu）/ `.rpm`（Fedora 等）
        with:
          script: |
            const fs = require('fs');
            const version = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8')).version;
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${version}`,
              target_commitish: context.sha,
              name: `midi2otomad v${version}`,
              body: process.env.RELEASE_BODY,
              draft: true,
              prerelease: false,
            });
            return data.id;

  build:
    name: ${{ matrix.label }}
    needs: create-release
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            label: macOS (Universal)
            args: --target universal-apple-darwin
            rust-targets: wasm32-unknown-unknown,aarch64-apple-darwin,x86_64-apple-darwin
          - platform: ubuntu-22.04
            label: Linux (x86_64)
            args: ""
            rust-targets: wasm32-unknown-unknown
          - platform: windows-latest
            label: Windows (x64)
            args: ""
            rust-targets: wasm32-unknown-unknown
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev libasound2-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.platform }}

      - name: Install trunk and the Tauri CLI
        run: cargo install --locked trunk tauri-cli

      - name: Build Tauri app and upload to the draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: cargo tauri
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

      - name: Upload installer artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: midi2otomad-${{ matrix.platform }}
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi
            target/release/bundle/deb/*.deb
            target/release/bundle/rpm/*.rpm
            target/release/bundle/appimage/*.AppImage
            target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: warn
          retention-days: 14

  publish-release:
    name: Publish release
    needs: [create-release, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish the release
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: Number(process.env.RELEASE_ID),
              draft: false,
              prerelease: false,
            });
