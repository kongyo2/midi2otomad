name: Release

on:
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            label: macOS (Universal)
            args: --target universal-apple-darwin
            rust-targets: wasm32-unknown-unknown,aarch64-apple-darwin,x86_64-apple-darwin
          - platform: ubuntu-22.04
            label: Linux (x86_64)
            args: ""
            rust-targets: wasm32-unknown-unknown
          - platform: windows-latest
            label: Windows (x64)
            args: ""
            rust-targets: wasm32-unknown-unknown
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev libasound2-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.platform }}

      - name: Install trunk and the Tauri CLI
        run: cargo install --locked trunk tauri-cli

      - name: Build Tauri app and publish to GitHub Releases
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: cargo tauri
          tagName: v__VERSION__
          releaseName: midi2otomad v__VERSION__
          releaseBody: |
            midi2otomad のインストーラ／実行ファイルです。お使いの OS のアセットをダウンロードしてください。

            - **Windows** — `.exe`（NSIS インストーラ）または `.msi`
            - **macOS**（Intel / Apple Silicon 共通のユニバーサルバイナリ）— `.dmg`
            - **Linux** — `.AppImage`（そのまま実行）/ `.deb`（Debian・Ubuntu）/ `.rpm`（Fedora 等）
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload installer artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: midi2otomad-${{ matrix.platform }}
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi
            target/release/bundle/deb/*.deb
            target/release/bundle/rpm/*.rpm
            target/release/bundle/appimage/*.AppImage
            target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: warn
          retention-days: 14
