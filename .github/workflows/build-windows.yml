name: Build Windows

on:
  workflow_dispatch:

concurrency:
  group: build-windows-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Windows installer
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install trunk and the Tauri CLI
        run: cargo install --locked trunk tauri-cli

      - name: Build Tauri app and publish to GitHub Releases
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: cargo tauri
          tagName: v__VERSION__
          releaseName: midi2otomad v__VERSION__
          releaseBody: Windows installer for midi2otomad. Download the .exe (NSIS) or .msi asset below to install.
          releaseDraft: false
          prerelease: false

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: midi2otomad-windows-x64
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi
          if-no-files-found: warn
          retention-days: 14
