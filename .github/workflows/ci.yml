name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: Core — fmt / clippy / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy (core)
        run: cargo clippy -p midi2otomad-core --all-targets -- -D warnings
      - name: Test (core)
        run: cargo test -p midi2otomad-core
      - name: Clippy (ui / wasm)
        run: cargo clippy -p midi2otomad-ui --target wasm32-unknown-unknown -- -D warnings

  app:
    name: Tauri app — Linux build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev libasound2-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install trunk
        run: cargo install --locked trunk
      - name: Build frontend (WASM)
        working-directory: ui
        run: trunk build
      - name: Clippy (tauri backend)
        run: cargo clippy -p midi2otomad -- -D warnings
      - name: Build app
        run: cargo build -p midi2otomad --release
