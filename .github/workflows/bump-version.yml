name: Bump Version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semver bump type
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major
      custom_version:
        description: Explicit version (e.g. 1.2.3) — overrides the bump type when set
        type: string
        required: false

concurrency:
  group: bump-version-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bump:
    name: Bump version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Compute and apply version
        id: bump
        env:
          BUMP: ${{ inputs.bump }}
          CUSTOM_VERSION: ${{ inputs.custom_version }}
        run: |
          current="$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "(.*)"/\1/')"
          if [ -n "${CUSTOM_VERSION}" ]; then
            new="${CUSTOM_VERSION}"
          else
            IFS='.' read -r major minor patch <<< "${current}"
            case "${BUMP}" in
              major) major=$((major + 1)); minor=0; patch=0 ;;
              minor) minor=$((minor + 1)); patch=0 ;;
              *) patch=$((patch + 1)) ;;
            esac
            new="${major}.${minor}.${patch}"
          fi
          sed -i "0,/^version = \".*\"/s//version = \"${new}\"/" Cargo.toml
          sed -i "s/\"version\": \".*\"/\"version\": \"${new}\"/" src-tauri/tauri.conf.json
          echo "version=${new}" >> "${GITHUB_OUTPUT}"

      - name: Commit, tag and push
        env:
          NEW_VERSION: ${{ steps.bump.outputs.version }}
          BRANCH: ${{ github.ref_name }}
        run: |
          git commit -am "chore: bump version to v${NEW_VERSION}"
          git tag "v${NEW_VERSION}"
          git push origin HEAD:"${BRANCH}"
          git push origin "v${NEW_VERSION}"

      - name: Summary
        env:
          NEW_VERSION: ${{ steps.bump.outputs.version }}
        run: echo "Bumped version to **v${NEW_VERSION}**" >> "${GITHUB_STEP_SUMMARY}"
